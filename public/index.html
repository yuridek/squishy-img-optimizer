<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Squishy</title>
    <link rel="icon" type="image/png" href="/squishy-app-icon.png">
    <link rel="apple-touch-icon" href="/squishy-app-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <header class="topbar">
          <div class="brand">
            <img src="/squishy-app-icon.png" alt="" width="56" height="56">
            <div>
              <p class="eyebrow">Image optimizer</p>
              <h1>Squishy</h1>
            </div>
          </div>
        </header>

        <div id="dropzone" class="dropzone">
          <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/avif">
          <div>
            <strong>Drop an image here</strong>
            <span>PNG, JPEG, WebP or AVIF up to 25 MB</span>
          </div>
        </div>

        <div class="preview-grid">
          <figure>
            <figcaption>Original</figcaption>
            <div class="preview-frame"><img id="originalPreview" alt=""></div>
          </figure>
          <figure>
            <figcaption>Optimized</figcaption>
            <div class="preview-frame"><img id="optimizedPreview" alt=""></div>
          </figure>
        </div>
      </section>

      <aside class="panel">
        <form id="settingsForm">
          <label>
            Format
            <select name="format">
              <option value="avif" selected>AVIF</option>
              <option value="webp">WebP</option>
            </select>
          </label>

          <label>
            Quality
            <input name="quality" type="range" min="1" max="100" value="50">
            <output id="qualityOutput">50</output>
          </label>

          <label>
            Effort
            <input name="effort" type="range" min="0" max="9" value="4">
            <output id="effortOutput">4</output>
          </label>

          <label class="check">
            <input name="lossless" type="checkbox">
            Lossless
          </label>

          <button class="button" type="submit">Optimize</button>
        </form>

        <dl class="stats">
          <div>
            <dt>Original</dt>
            <dd id="originalSize">-</dd>
          </div>
          <div>
            <dt>Optimized</dt>
            <dd id="optimizedSize">-</dd>
          </div>
          <div>
            <dt>Savings</dt>
            <dd id="savings">-</dd>
          </div>
        </dl>

        <p id="status" class="status">Choose an image to begin.</p>
        <button id="downloadButton" class="button secondary download-action" disabled>Download</button>
      </aside>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
